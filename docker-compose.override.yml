# Development overrides — exposes additional ports for local development
# This file is automatically applied when running `docker compose up` in development

services:
  app:
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  db:
    ports:
      - "5432:5432"  # Expose DB for local tools (DBeaver, psql, etc.)

  nginx:
    ports:
      - "80:80"
      - "443:443"
