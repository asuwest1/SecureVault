<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#f8fafc"/>

  <!-- Shield icon -->
  <circle cx="640" cy="120" r="32" fill="#f1f5f9"/>
  <path d="M640 100 L624 108 L624 122 C624 132 631 141 640 144 C649 141 656 132 656 122 L656 108 Z" fill="#1e293b"/>
  <path d="M635 123 L630 118 L632 116 L635 119 L648 106 L650 108 Z" fill="white"/>

  <text x="640" y="178" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SecureVault Setup</text>
  <text x="640" y="198" text-anchor="middle" font-size="13" fill="#64748b">First-time configuration wizard</text>

  <!-- Step indicator - step 2 active -->
  <circle cx="480" cy="230" r="14" fill="#1e293b"/>
  <text x="480" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="white">✓</text>
  <rect x="494" y="229" width="48" height="2" fill="#1e293b"/>
  <circle cx="556" cy="230" r="14" fill="#1e293b"/>
  <text x="556" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="white">2</text>
  <rect x="570" y="229" width="48" height="2" fill="#e2e8f0"/>
  <circle cx="632" cy="230" r="14" fill="#f1f5f9"/>
  <text x="632" y="235" text-anchor="middle" font-size="11" fill="#64748b">3</text>
  <rect x="646" y="229" width="48" height="2" fill="#e2e8f0"/>
  <circle cx="708" cy="230" r="14" fill="#f1f5f9"/>
  <text x="708" y="235" text-anchor="middle" font-size="11" fill="#64748b">4</text>
  <rect x="722" y="229" width="48" height="2" fill="#e2e8f0"/>
  <circle cx="784" cy="230" r="14" fill="#f1f5f9"/>
  <text x="784" y="235" text-anchor="middle" font-size="11" fill="#64748b">5</text>

  <!-- Content -->
  <text x="415" y="278" font-size="17" font-weight="600" fill="#0f172a">Administrator Account</text>

  <!-- Username -->
  <text x="415" y="310" font-size="13" font-weight="500" fill="#0f172a">Username</text>
  <rect x="415" y="316" width="450" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="428" y="339" font-size="13" fill="#0f172a">admin</text>

  <!-- Email -->
  <text x="415" y="374" font-size="13" font-weight="500" fill="#0f172a">Email</text>
  <rect x="415" y="380" width="450" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="428" y="403" font-size="13" fill="#0f172a">admin@company.internal</text>

  <!-- Password -->
  <text x="415" y="438" font-size="13" font-weight="500" fill="#0f172a">Password</text>
  <rect x="415" y="444" width="450" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="428" y="467" font-size="14" fill="#94a3b8">••••••••••••••••</text>

  <!-- Confirm Password -->
  <text x="415" y="502" font-size="13" font-weight="500" fill="#0f172a">Confirm Password</text>
  <rect x="415" y="508" width="450" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="428" y="531" font-size="14" fill="#94a3b8">••••••••••••••••</text>

  <!-- Back / Next buttons -->
  <rect x="415" y="566" width="216" height="38" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="523" y="590" text-anchor="middle" font-size="13" fill="#0f172a">Back</text>

  <rect x="649" y="566" width="216" height="38" rx="6" fill="#1e293b"/>
  <text x="757" y="590" text-anchor="middle" font-size="13" font-weight="500" fill="white">Next</text>
