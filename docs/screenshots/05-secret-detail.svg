<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#f8fafc"/>

  <!-- Page content (max-w-2xl centered) -->
  <!-- Back arrow -->
  <text x="290" y="68" font-size="20" fill="#94a3b8">←</text>

  <!-- Title row -->
  <text x="322" y="68" font-size="20" font-weight="600" fill="#0f172a">Production Database — PostgreSQL</text>

  <!-- Action buttons -->
  <rect x="828" y="48" width="74" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Edit icon -->
  <path d="M846 60 L848 58 L854 64 L852 66 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
  <text x="856" y="68" font-size="13" fill="#0f172a">Edit</text>

  <rect x="912" y="48" width="78" height="32" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Trash icon -->
  <rect x="929" y="58" width="10" height="12" rx="1" fill="none" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="927" y1="58" x2="941" y2="58" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="931" y1="55" x2="937" y2="55" stroke="#ef4444" stroke-width="1.2"/>
  <text x="944" y="68" font-size="13" fill="#ef4444">Delete</text>

  <!-- Detail card -->
  <rect x="290" y="92" width="700" height="480" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Type -->
  <rect x="290" y="92" width="700" height="52" rx="0" fill="transparent"/>
  <text x="314" y="123" font-size="13" font-weight="500" fill="#64748b">Type</text>
  <text x="700" y="123" font-size="13" fill="#0f172a">Password</text>
  <line x1="290" y1="144" x2="990" y2="144" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Username -->
  <text x="314" y="175" font-size="13" font-weight="500" fill="#64748b">Username</text>
  <text x="700" y="175" font-size="13" font-family="monospace" fill="#0f172a">postgres</text>
  <line x1="290" y1="196" x2="990" y2="196" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: URL -->
  <text x="314" y="227" font-size="13" font-weight="500" fill="#64748b">URL</text>
  <text x="700" y="227" font-size="13" fill="#2563eb" text-decoration="underline">db.company.internal:5432</text>
  <line x1="290" y1="248" x2="990" y2="248" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Value (masked with Reveal button) -->
  <text x="314" y="279" font-size="13" font-weight="500" fill="#64748b">Value</text>
  <!-- Masked value -->
  <text x="700" y="279" font-size="14" fill="#94a3b8">••••••••••••••••••</text>
  <!-- Reveal button -->
  <rect x="858" y="263" width="112" height="30" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Eye icon simplified -->
  <ellipse cx="879" cy="278" rx="6" ry="4" fill="none" stroke="#475569" stroke-width="1.2"/>
  <circle cx="879" cy="278" r="2" fill="#475569"/>
  <text x="891" y="282" font-size="12" fill="#475569">Reveal  Copy</text>
  <line x1="290" y1="308" x2="990" y2="308" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Notes -->
  <text x="314" y="336" font-size="13" font-weight="500" fill="#64748b">Notes</text>
  <line x1="290" y1="308" x2="990" y2="308" stroke="#e2e8f0" stroke-width="1"/>
  <text x="314" y="360" font-size="13" fill="#64748b">Primary PostgreSQL instance for the production environment.</text>
  <text x="314" y="378" font-size="13" fill="#64748b">Rotated quarterly. Last rotation: 2025-12-01.</text>
  <line x1="290" y1="396" x2="990" y2="396" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Tags -->
  <text x="314" y="427" font-size="13" font-weight="500" fill="#64748b">Tags</text>
  <rect x="700" y="412" width="80" height="22" rx="11" fill="#f1f5f9"/>
  <text x="740" y="427" text-anchor="middle" font-size="12" fill="#475569">#production</text>
  <rect x="790" y="412" width="62" height="22" rx="11" fill="#f1f5f9"/>
  <text x="821" y="427" text-anchor="middle" font-size="12" fill="#475569">#database</text>
  <line x1="290" y1="448" x2="990" y2="448" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Created -->
  <text x="314" y="479" font-size="13" font-weight="500" fill="#64748b">Created</text>
  <text x="700" y="479" font-size="13" fill="#64748b">2/15/2026, 9:30:00 AM</text>
  <line x1="290" y1="500" x2="990" y2="500" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row: Updated -->
  <text x="314" y="531" font-size="13" font-weight="500" fill="#64748b">Updated</text>
  <text x="700" y="531" font-size="13" fill="#64748b">2/28/2026, 3:45:22 PM</text>
</svg>
