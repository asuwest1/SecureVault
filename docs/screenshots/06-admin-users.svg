  <rect x="140" y="116" width="1000" height="20" fill="#f8fafc"/>
  <text x="162" y="119" font-size="12" font-weight="600" fill="#64748b">USERNAME</text>
  <text x="320" y="119" font-size="12" font-weight="600" fill="#64748b">EMAIL</text>
  <text x="560" y="119" font-size="12" font-weight="600" fill="#64748b">STATUS</text>
  <text x="680" y="119" font-size="12" font-weight="600" fill="#64748b">ROLES</text>
  <text x="780" y="119" font-size="12" font-weight="600" fill="#64748b">AUTH</text>

  <!-- Divider -->
  <line x1="140" y1="136" x2="1140" y2="136" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 1: admin (super admin) -->
  <rect x="140" y="136" width="1000" height="52" fill="white"/>
  <text x="162" y="167" font-size="13" font-weight="500" fill="#0f172a">admin</text>
  <rect x="212" y="156" width="38" height="18" rx="3" fill="#fef3c7"/>
  <text x="231" y="169" text-anchor="middle" font-size="10" fill="#92400e">admin</text>
  <text x="320" y="167" font-size="13" fill="#64748b">admin@company.internal</text>
  <rect x="560" y="153" width="52" height="20" rx="10" fill="#dcfce7"/>
  <text x="586" y="167" text-anchor="middle" font-size="11" fill="#166534">Active</text>
  <text x="680" y="167" font-size="13" fill="#64748b">0 roles</text>
  <text x="780" y="167" font-size="13" fill="#64748b">Local</text>
  <line x1="140" y1="188" x2="1140" y2="188" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 2: jsmith -->
  <rect x="140" y="188" width="1000" height="52" fill="white"/>
  <text x="162" y="219" font-size="13" font-weight="500" fill="#0f172a">jsmith</text>
  <text x="320" y="219" font-size="13" fill="#64748b">j.smith@company.internal</text>
  <rect x="560" y="205" width="52" height="20" rx="10" fill="#dcfce7"/>
