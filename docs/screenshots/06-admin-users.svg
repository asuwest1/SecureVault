<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#f8fafc"/>

  <!-- Back arrow + title row -->
  <text x="140" y="68" font-size="20" fill="#94a3b8">←</text>
  <text x="172" y="68" font-size="20" font-weight="600" fill="#0f172a">User Management</text>

  <!-- New User button -->
  <rect x="1050" y="48" width="90" height="32" rx="6" fill="#1e293b"/>
  <line x1="1067" y1="64" x2="1079" y2="64" stroke="white" stroke-width="1.5"/>
  <line x1="1073" y1="58" x2="1073" y2="70" stroke="white" stroke-width="1.5"/>
  <text x="1084" y="69" font-size="13" font-weight="500" fill="white">New User</text>

  <!-- Table container -->
  <rect x="140" y="92" width="1000" height="480" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Table header -->
