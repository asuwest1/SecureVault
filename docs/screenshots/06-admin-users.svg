  <text x="680" y="219" font-size="13" fill="#64748b">2 roles</text>
  <text x="780" y="219" font-size="13" fill="#64748b">LDAP + MFA</text>
  <!-- Deactivate icon -->
  <rect x="1090" y="205" width="28" height="28" rx="4" fill="transparent"/>
  <circle cx="1098" cy="215" r="5" fill="none" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="1104" y1="221" x2="1110" y2="227" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="1092" y1="209" x2="1110" y2="227" stroke="#ef4444" stroke-width="1.3"/>
  <line x1="140" y1="240" x2="1140" y2="240" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 3: mturner -->
  <rect x="140" y="240" width="1000" height="52" fill="white"/>
  <text x="162" y="271" font-size="13" font-weight="500" fill="#0f172a">mturner</text>
  <text x="320" y="271" font-size="13" fill="#64748b">m.turner@company.internal</text>
  <rect x="560" y="257" width="52" height="20" rx="10" fill="#dcfce7"/>
