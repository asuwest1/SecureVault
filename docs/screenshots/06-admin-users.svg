  <!-- Row 4: bwilson (inactive) -->
  <rect x="140" y="292" width="1000" height="52" fill="white"/>
  <text x="162" y="323" font-size="13" font-weight="500" fill="#0f172a">bwilson</text>
  <text x="320" y="323" font-size="13" fill="#64748b">b.wilson@company.internal</text>
  <rect x="560" y="309" width="60" height="20" rx="10" fill="#fee2e2"/>
  <text x="590" y="323" text-anchor="middle" font-size="11" fill="#991b1b">Inactive</text>
  <text x="680" y="323" font-size="13" fill="#64748b">1 role</text>
  <text x="780" y="323" font-size="13" fill="#64748b">Local</text>
  <!-- Activate icon (user-check) -->
  <circle cx="1098" cy="311" r="5" fill="none" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="1104" y1="317" x2="1110" y2="323" stroke="#94a3b8" stroke-width="1.3"/>
  <polyline points="1092,322 1096,326 1104,318" fill="none" stroke="#22c55e" stroke-width="1.3"/>
  <line x1="140" y1="344" x2="1140" y2="344" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 5: cnguyen -->
  <rect x="140" y="344" width="1000" height="52" fill="white"/>
  <text x="162" y="375" font-size="13" font-weight="500" fill="#0f172a">cnguyen</text>
  <text x="320" y="375" font-size="13" fill="#64748b">c.nguyen@company.internal</text>
  <rect x="560" y="361" width="52" height="20" rx="10" fill="#dcfce7"/>
  <text x="586" y="375" text-anchor="middle" font-size="11" fill="#166534">Active</text>
  <text x="680" y="375" font-size="13" fill="#64748b">2 roles</text>
  <text x="780" y="375" font-size="13" fill="#64748b">LDAP</text>
  <line x1="140" y1="396" x2="1140" y2="396" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 6: rlopez -->
  <rect x="140" y="396" width="1000" height="52" fill="white"/>
  <text x="162" y="427" font-size="13" font-weight="500" fill="#0f172a">rlopez</text>
  <text x="320" y="427" font-size="13" fill="#64748b">r.lopez@company.internal</text>
  <rect x="560" y="413" width="52" height="20" rx="10" fill="#dcfce7"/>
  <text x="586" y="427" text-anchor="middle" font-size="11" fill="#166534">Active</text>
  <text x="680" y="427" font-size="13" fill="#64748b">1 role</text>
  <text x="780" y="427" font-size="13" fill="#64748b">Local</text>
  <line x1="140" y1="448" x2="1140" y2="448" stroke="#e2e8f0" stroke-width="1"/>
</svg>
